<!DOCTYPE html>
<html lang="fr" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIC | Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f5ff', 100: '#e5edff', 500: '#6875f5', 600: '#5850ec', 700: '#5145cd', 900: '#362f78'
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                        'spin-slow-reverse': 'spin 12s linear infinite reverse',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen items-center justify-center p-6">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        
        <!-- Header -->
        <div class="p-8 text-center bg-slate-50/50 border-b border-slate-100">
            <div class="relative w-24 h-24 mx-auto flex items-center justify-center group mb-6">
                <!-- Globe Base -->
                <div class="absolute inset-1.5 bg-gradient-to-br from-blue-500 to-blue-700 rounded-full shadow-lg shadow-blue-500/40"></div>
                <!-- Grid/Meridians -->
                <svg class="absolute inset-1.5 w-20 h-20 text-white/20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    <path d="M2 12h20"></path>
                </svg>
                <!-- Text Inside -->
                <span class="absolute z-10 font-black text-white text-3xl tracking-widest drop-shadow-lg">SIC</span>
                <!-- Orbit Ring 1 (Animated) -->
                <div class="absolute inset-0 rounded-full border-2 border-cyan-400/60 transform rotate-[15deg] animate-spin-slow pointer-events-none">
                    <div class="absolute top-0 left-1/2 -ml-2 -mt-2 w-4 h-4 bg-emerald-400 rounded-full shadow-[0_0_12px_rgba(52,211,153,0.8)]"></div>
                </div>
                <!-- Orbit Ring 2 (Animated reverse) -->
                <div class="absolute inset-0 rounded-full border-2 border-cyan-300/40 transform rotate-[75deg] scale-110 animate-spin-slow-reverse pointer-events-none">
                    <div class="absolute bottom-0 right-1/2 -mr-1.5 -mb-1.5 w-3 h-3 bg-emerald-300 rounded-full shadow-[0_0_12px_rgba(110,231,183,0.8)]"></div>
                </div>
            </div>
            <p class="text-sm text-slate-500 mt-2">Connectez-vous au Backoffice SIC.</p>
        </div>

        <!-- Form -->
        <div class="p-8">
            {% if messages %}
                {% for message in messages %}
                <div class="mb-6 p-4 rounded-xl text-sm font-medium bg-rose-50 text-rose-600 border border-rose-100 flex items-center gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'dashboard:login' %}" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
                
                <div class="space-y-1">
                    <label class="text-sm font-semibold text-slate-700">Identifiant</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="text" name="username" required placeholder="admin" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-semibold text-slate-700">Mot de passe</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="password" name="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full py-3.5 mt-2 bg-brand-600 text-white rounded-xl font-bold hover:bg-brand-700 hover:shadow-lg hover:shadow-brand-500/30 transition-all flex items-center justify-center gap-2">
                    Connexion <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
        
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
