name: sic_mobile
description: SIC Mobile - Systeme Inter-Connexion Mobile Money.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.4.3
  equatable: ^2.0.5
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  go_router: ^13.2.0
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  local_auth: ^2.2.0
  retrofit: ^4.1.0
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  biometric_signature: ^12.0.1
  uuid: ^4.5.3
  image_picker: ^1.2.2
  # Temps reel : client WebSocket (notifications de transaction en direct).
  web_socket_channel: ^3.0.1
  # Monitoring d'erreurs (actif seulement si SENTRY_DSN est defini dans .env)
  sentry_flutter: ^9.0.0

dev_dependencies:
  build_runner: ^2.4.9
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0

# Generation des icones de lancement (android + ios) a partir du visuel SIC.
# Lancer : dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.jpeg"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

  # Police Inter bundlee (variable) : pas de fetch reseau runtime (cf. retrait
  # de google_fonts) -> demarrage instantane + hors-ligne.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
