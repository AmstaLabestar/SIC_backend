# =============================================================================
# SIC - Configuration Prometheus
# Scrape les metriques exposees par l'app Django (/metrics via django-prometheus)
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus se surveille lui-meme.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Application Django (daphne) — metriques requetes/latence/codes HTTP.
  - job_name: sic-web
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]
