version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: sic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sic_db
      POSTGRES_USER: sic_user
      POSTGRES_PASSWORD: "8258"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sic_user -d sic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: sic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sic_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://sic_user:8258@db:5432/sic_db
      - USE_DOCKER=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=change-this-in-production-use-secure-random-key
      # Dev: inscription non throttlee pour faciliter les tests (prod=3/hour).
      - REGISTER_THROTTLE_RATE=1000/hour
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sic_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://sic_user:8258@db:5432/sic_db
      - USE_DOCKER=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=change-this-in-production-use-secure-random-key
      # Dev: inscription non throttlee pour faciliter les tests (prod=3/hour).
      - REGISTER_THROTTLE_RATE=1000/hour
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Sauvegarde PostgreSQL automatisee (pg_dump horodate + rotation)
  db-backup:
    image: postgres:16-alpine
    container_name: sic_db_backup
    restart: unless-stopped
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=sic_user
      - PGPASSWORD=8258
      - PGDATABASE=sic_db
      # Quotidien ; rotation 7 jours + 4 semaines + 6 mois.
      - BACKUP_INTERVAL_SECONDS=86400
      - KEEP_DAILY=7
      - KEEP_WEEKLY=4
      - KEEP_MONTHLY=6
    volumes:
      - ./ops/backup:/ops:ro
      - pg_backups:/backups
    entrypoint: ["/bin/sh", "/ops/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy

  # Celery Beat (planificateur des taches periodiques : reconciliation, purge OTP)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sic_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://sic_user:8258@db:5432/sic_db
      - USE_DOCKER=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=change-this-in-production-use-secure-random-key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  pg_backups: